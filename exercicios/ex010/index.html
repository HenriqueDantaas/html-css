<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>medias  em  HTML5</title>
</head>
<body>
    <h1>imagem  dinamica</h1>
    <p>tente abrir esse site em varios dispositivos diferentes ou smplesmente aumente e diminua o tamanho do sei navegador. </p>
    
    
    <picture>
        <source media="(max-width: 750px )" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1000px)" srcset="imagens/foto-m.png " type="image/png">
        <img src="imagens/foto-g.png" alt="imagem flexivel">
    </picture>

    <h1>reproduzindo audio</h1>
    <p>Vamos aprender a reproduzir audios em HTML5</p>
    <audio src="midia/Malkauns - Aditya Verma.mp3" controls autoplay></audio>
</body>
</html>
